<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Generator — Test Harness</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <h1>Certificate Generator</h1>
        <p class="sub">Generate and download a PDF certificate.</p>
        <label for="donorName">Donor name</label>
        <input type="text" id="donorName" placeholder="e.g. Vivek Mandal" autocomplete="off" />
        <div class="actions">
            <button id="downloadBtn">Download PDF</button>
        </div>
        <div id="status"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
